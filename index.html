	  <style>
        :root {
            --primary: #5865F2;
            --background: #36393F;
            --header: #2F3136;
            --input-bg: #40444B;

        .chat-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 600px;
            border-radius: 12px;
            background: var(--background);

        }

        .chat-header {
            padding: 12px 16px;
            background: var(--header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            position: relative;
            border-radius: 12px 12px 0 0;
            color: #fff;
        }

        .unread-badge {
            position: absolute;
            top: 0px;
            right: 0px;
            background: #ED4245;

        .chat-body {
            flex: 1;

        }

        .chat-input {

        }

        .message-input {
            flex: 1;
            background: var(--input-bg);

            font-size: 14px;
            margin-right: 8px;
        }

        .message {
            max-width: 80%;
            padding: 12px;
            border-radius: 15px;
            background: var(--header);

        }

        .message.self {
            background: var(--primary);

<div class="chat-wrapper">
        <div class="chat-header">
            <div class="chat-title">💬 WORLD CHAT</div>
            <div>
                <button class="chat-btn" id="minimize-btn"><i class="fas fa-times">x</i></button>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
   <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";
        import { 
            getDatabase, 
            ref, 
            push, 
            onValue, 
            serverTimestamp,
            query,
            limitToLast,
            set,
            get
        } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-database.js";

		function xyz(str) {
            let ops = '';
            for (let i = 0; i < str.length; i++) {
                ops += str.charCodeAt(i).toString(16).padStart(2, '0');
            }
            return ops;
        }

        function hts(ops) {
            let str = '';
            for (let i = 0; i < ops.length; i += 2) {
                str += String.fromCharCode(parseInt(ops.substr(i, 2), 16));
            }
            return str;
        }

        const fch = "7b226170694b6579223a2241497a61537941535a516966395f757a73484c5230363938496f727644577a504d6d32714f6541222c2261757468446f6d61696e223a2263686174692d35643462352e66697265626173656170702e636f6d222c22646174616261736555524c223a2268747470733a2f2f63686174692d35643462352d64656661756c742d727464622e617369612d736f75746865617374312e666972656261736564617461626173652e617070222c2270726f6a6563744964223a2263686174692d3564346235222c2273746f726167654275636b6574223a2263686174692d35643462352e666972656261736573746f726167652e617070222c226d6573736167696e6753656e6465724964223a22333035373338333630393934222c226170704964223a22313a3330353733383336303939343a7765623a36313566386263616338653861363333653034666662222c226d6561737572656d656e744964223a22472d4d53325739464b4d4657227d";

        const fcsd = hts(fch);
        const firebaseConfig = JSON.parse(fcsd);
		
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // Fungsi generate username dari UID
        const generateUsernameFromUID = (uid) => {
            const hash = uid.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            return `~anonymous${(hash % 9000 + 1000).toString().padStart(4, '0')}`;
        };

        // Fungsi generate warna dari UID
        const uidToColor = (uid) => {
            let hash = 0;
            for (let i = 0; i < uid.length; i++) {
                hash = uid.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash % 360);
            return `hsl(${hue}, 70%, 60%)`;
        };

        // Simpan username ke database
        const initializeUser = async (user) => {
            const userRef = ref(database, `users/${user.uid}`);
            const snapshot = await get(userRef);
            
            const validKey = getCookie('validKey');
            let username;

            if (validKey) {
                const [storedKey, expirationDate] = validKey.split('|');
                if (new Date() <= new Date(expirationDate) && freetoken[storedKey] || admintoken[storedKey]) {
                    username = freetoken[storedKey] || admintoken[storedKey];
                }
            }

            if (!snapshot.exists()) {
                if (!username) {
                    username = generateUsernameFromUID(user.uid);
                }
                await set(userRef, {
                    username: username,
                    created: serverTimestamp()
                });
            } else if (username) {
                // Update username jika ada valid key
                await set(userRef, {
                    ...snapshot.val(),
                    username: username
                });
            }
        };

        // Get username dari UID
        const getUsername = async (uid) => {
            const validKey = getCookie('validKey');
            if (validKey) {
                const [storedKey, expirationDate] = validKey.split('|');
                if (new Date() <= new Date(expirationDate) && freetoken[storedKey] || admintoken[storedKey]) {
                    return freetoken[storedKey] || admintoken[storedKey];
                }
            }
            const userRef = ref(database, `users/${uid}`);
            const snapshot = await get(userRef);
            return snapshot.val()?.username || generateUsernameFromUID(uid);
        };

        // Inisialisasi Interact.js
        interact('.chat-header').draggable({
            cursorChecker() { return 'move'; },
            listeners: {
                move(event) {
                    const target = event.target.closest('.chat-wrapper');
                    const x = (parseFloat(target.style.left) || 0) + event.dx;
                    const y = (parseFloat(target.style.top) || 0) + event.dy;
                    
                    target.style.left = `${x}px`;
                    target.style.top = `${y}px`;
                }
            }
        });

        let isMinimized = false;
        let unreadMessages = 0;
        let currentUser = null;

        const chatWrapper = document.querySelector('.chat-wrapper');
        const minimizedView = document.getElementById('minimized-view');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const chatBody = document.getElementById('chat-body');

        // Fungsi toggle chat
        function toggleChat() {
            isMinimized = !isMinimized;
            chatWrapper.style.display = isMinimized ? 'none' : 'flex';
            minimizedView.style.display = isMinimized ? 'flex' : 'none';
            
            if(!isMinimized) {
                unreadMessages = 0;
                updateBadge();
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }

        // Update badge
        function updateBadge() {
            document.querySelectorAll('.unread-badge').forEach(badge => {
                badge.textContent = unreadMessages;
                badge.style.display = unreadMessages > 0 ? 'flex' : 'none';
            });
        }

        // Event listeners
        document.getElementById('minimize-btn').addEventListener('click', toggleChat);
        minimizedView.addEventListener('click', toggleChat);

        // Firebase Auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await initializeUser(user);
                currentUser = user;
                initializeChat();
            } else {
                signInAnonymously(auth).catch(error => {
                    console.error('Autentikasi gagal:', error);
                });
            }
        });

        // Inisialisasi chat
        function initializeChat() {
            const messagesRef = query(ref(database, 'messages'), limitToLast(100));
            
            onValue(messagesRef, async (snapshot) => {
                chatBody.innerHTML = '';
                
                snapshot.forEach((childSnapshot) => {
                    const message = childSnapshot.val();
                    const isSelf = message.uid === currentUser.uid;
                    const usernameColor = uidToColor(message.uid);
                    
                    const messageEl = document.createElement('div');
                    messageEl.className = `message ${isSelf ? 'self' : ''}`;
                    messageEl.innerHTML = `
                        <div class="message-header">
                            <span class="username" style="color: ${usernameColor}">
                                ${message.username}
                            </span>
                            <span>${new Date(message.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div>${message.text}</div>
                    `;
                    chatBody.appendChild(messageEl);
					
                });
                
                if(!isMinimized) {
                    chatBody.scrollTop = chatBody.scrollHeight;
					document.querySelector('#chat_audio').play();
                } else {
                    unreadMessages++;
                    updateBadge();
					document.querySelector('#chat_audio').play();
                }
            });

            // Handle pengiriman pesan
            messageForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = messageInput.value.trim();
                
                if(message && currentUser) {
                    try {
                        const username = await getUsername(currentUser.uid);
                        
                        await push(ref(database, 'messages'), {
                            text: message,
                            timestamp: serverTimestamp(),
                            uid: currentUser.uid,
                            username: username
                        });
                        messageInput.value = '';
                    } catch (error) {
                        console.error('Gagal mengirim pesan:', error);
                    }
                }
            });
        }
    </script>
