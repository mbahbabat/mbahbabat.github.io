<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">


	<style>
		*{margin:0;padding:0;box-sizing:border-box;}
			*,*:before,*:after{box-sizing: inherit;}
			html{-ms-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;box-sizing:border-box; }
			html,body{font-family:Verdana,sans-serif;font-size:14px;line-height:1.5;}
			html::-webkit-scrollbar,.element::-webkit-scrollbar{display: none;}
			a{text-decoration: none;background:0 0}
			mark{background:#ff0;color:#000}
			img{border-style: none;}
			@media print{*{text-shadow:none!important;color:#000!important;background:0 0!important;box-shadow:none!important}}
	
		body{
		display:flex;
		padding:0;
		margin:0;
		color:#d9d9d9;
		}

		.btn-primary{
		padding:10px;
		cursor: pointer;		
		}
		
		.btn-scondary{
		padding:5px;
		cursor: pointer;
		}		

		.flexi{
		display:flex;
		position:absolute;
		width:100%;
		height:100%;
		background: linear-gradient(to right, #111109 0%, #003366 100%);
		justify-content:center;
		align-items:center;
		}
		
		.boxi{
		display:flex;
		justify-content:center;			
		position:relative;
		}
		
		@media screen and (max-width: 1199px) {
			.boxi {			
			display:block;
			width:100%!important;
			height:100%!important;
			}
			.gchecker {
			width:100%!important;			
			}
			.result {
			width:100%!important;
			display:block!important;
			min-height:650px;
			}			
		}

		@media screen and (min-width: 1200px) {
			.boxi {
			width:1200px}
		}
		
		.gchecker{	
		width:50%;
		background:#666666;
		padding:25px;
		border-right: 1px solid black;
		border-radius:5px;		
		}
		
		.result{
		display:flex;
		justify-content:center;		
		width:50%;	
		background:#666666;	
		padding:25px;
		position:relative;
		border-left: 1px solid black;
		border-radius:5px;
		}	

		.CodeMirror{
		height:200px!important;
		width:100%!important; 	
		}
		

		.CodeMirror-scroll{
		background: #e6e6e6!important; 
		color: #333333!important;
		}

		.CodeMirror-gutters{
		background: #e6e6e6!important;
		border:none!important;
		}
		
		.btn-executor{
		display:flex;
		justify-content:right;
		}
		
		@keyframes progress-bar-stripes
		{
			from
			{
				background-position: .5rem 0;
			}
			to
			{
				background-position: 0 0;
			}
		}

		.progress
		{
			font-size: .75rem;

			display: flex;
			overflow: hidden;

			height: 14px;
			width:100%;

			border-radius: 50rem;
			background-color: #eaecf3;
			box-shadow: inset 0 .1rem .1rem rgba(31, 45, 61, .1);
		}

		.progress-bar
		{
			display: flex;
			overflow: hidden;
			flex-direction: column;

			transition: width .6s ease; 
			text-align: center;
			white-space: nowrap;

			color: #ffffff;
			background-color: green;

			justify-content: center;
		}
		@media (prefers-reduced-motion: reduce)
		{
			.progress-bar
			{
				transition: none;
			}
		}

		.progress-bar-striped
		{
			background-image: linear-gradient(45deg, rgba(255, 255, 255, .15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, .15) 50%, rgba(255, 255, 255, .15) 75%, transparent 75%, transparent);
			background-size: .5rem .5rem;
		}

		.progress-bar-animated
		{
			animation: progress-bar-stripes 1s linear infinite;
		}
		@media (prefers-reduced-motion: reduce)
		{
			.progress-bar-animated
			{
				animation: none;
			}
		}		

	</style>
	<link rel="stylesheet" href="https:mbahbabat.github.io/css/codemirror.css">
</head>
<body>
	<div class="flexi">
		<div class="boxi">
			<div class="gchecker">
				<div>
					<h2 style="color:#ffffff;margin-bottom:25px;">BULK GMAIL CHECKER V.1.2</h2>
				</div>		
				<div>
					<h3 style="color:#ffffff">MASUKKAN GMAIL</h3>
					<p>Format : user@gmail.com</p>
					<textarea id="mail-input" ></textarea>		
				</div>
				<div style="margin-top:25px">
					<h3 style="color:#ffffff">RESULT</h3>
					<textarea id="mail-output" style="color:green!important"></textarea>
				</div>
				<div style="display:flex;align-items:center;">
					<p style="font-size:16px">proses: </p>
					<div class="progress progress-lg">
				   <div id="mail-progress-bar" class="progress-bar progress-bar-striped" role="progressbar" style="width: 0%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">0%</div>
					</div>
				</div>
				<div class="btn-executor">
					<button id="clear-editor" class="btn-primary">HAPUS</button>			
					<button id="check-btn" class="btn-primary">CEK</button>
				</div>				
			</div>
			<div class="result">
				<div>
					<div class="indicator" style="width:100%;display:block;position:relative;">
						<h3 style="font-size:16px;color:#ffffff;margin:0px 0px 15px 0px;">INDIKATOR :</h3>
						<div>
							<div style="width:75px;display:inline-block">Good</div>
							<div style="width:10px;display:inline-block">:</div>
							<div style="color:#00ff00;display:inline-block">Bagus</div>
						</div>
						<div>
							<div style="width:75px;display:inline-block">Ver</div>
							<div style="width:10px;display:inline-block">:</div>
							<div style="color:#ffff00;display:inline-block">Butuh Verifikasi</div>
						</div>
						<div>
							<div style="width:75px;display:inline-block">Unknown</div>
							<div style="width:10px;display:inline-block">:</div>
							<div style="color:#ff9900;display:inline-block">Terjadi Masalah</div>
						</div>
						<div>
							<div style="width:75px;display:inline-block">Disabled</div>
							<div style="width:10px;display:inline-block">:</div>
							<div style="color:#ff471a;display:inline-block">Dinonaktifkan</div>
						</div>
						<div>
							<div style="width:75px;display:inline-block">Not_Exist</div>
							<div style="width:10px;display:inline-block">:</div>
							<div style="color:#00ffff;display:inline-block">Tidak Terdaftar</div>
						</div>
					</div>
					<div class="downlaod-result" style="width:100%">
						<h3 style="font-size:16px;color:#ffffff;margin:30px 0px 15px 0px;">DOWNLOAD RESULT :</h3>
						<div class="good" style="display:flex;justify-content:left;align-items:center;padding:5px 0px 5px 0px">
							<p style="width:75px">Good</p>
							<span id="rp-good" style=";border-radius:5px;width:125px;height:30px;font-weight:bold;background:#404040;text-align:center;box-shadow: 1px 1px 3px 1px inset #000000;display:flex;justify-content:center;align-items:center;margin-right:10px;color:#00ff00;"></span>							
							<button class="btn-scondary" onclick="downloadFile(&#39;good&#39;)" >
							<span>  download</span>
							</button>						
						</div>
						<div class="good" style="display:flex;justify-content:left;align-items:center;padding:5px 0px 5px 0px">
							<p style="width:75px">Ver</p>
							<span id="rp-ver" style=";border-radius:5px;width:125px;height:30px;font-weight:bold;background:#404040;text-align:center;box-shadow: 1px 1px 3px 1px inset #000000;display:flex;justify-content:center;align-items:center;margin-right:10px;color:#ffff00;"></span>								
							<button class="btn-scondary" onclick="downloadFile(&#39;ver&#39;)" >
							<span>  download</span>
							</button>					
						</div>
						<div class="good" style="display:flex;justify-content:left;align-items:center;padding:5px 0px 5px 0px">
							<p style="width:75px">Unknown</p>
							<span id="rp-unknown" style=";border-radius:5px;width:125px;height:30px;font-weight:bold;background:#404040;text-align:center;box-shadow: 1px 1px 3px 1px inset #000000;display:flex;justify-content:center;align-items:center;margin-right:10px;color:#ff9900;"></span>							
							<button class="btn-scondary" onclick="downloadFile(&#39;unknown&#39;)" >
							<span>  download</span>
							</button>						
						</div>	
						<div class="good" style="display:flex;justify-content:left;align-items:center;padding:5px 0px 5px 0px">
							<p style="width:75px">Disabled</p>
							<span id="rp-disabled" style=";border-radius:5px;width:125px;height:30px;font-weight:bold;background:#404040;text-align:center;box-shadow: 1px 1px 3px 1px inset #000000;display:flex;justify-content:center;align-items:center;margin-right:10px;color:#ff471a;"></span>							
							<button class="btn-scondary" onclick="downloadFile(&#39;disable&#39;)" >
							<span>  download</span>
							</button>
						</div>	
						<div class="good" style= "display:flex;justify-content:left;align-items:center;padding:5px 0px 5px 0px">
							<p style="width:75px">Not-Exist</p>
							<span id="rp-not-exist" style=";border-radius:5px;width:125px;height:30px;font-weight:bold;background:#404040;text-align:center;box-shadow: 1px 1px 3px 1px inset #000000;display:flex;justify-content:center;align-items:center;margin-right:10px;color:#00ffff;"></span>							
							<button class="btn-scondary"  onclick="downloadFile(&#39;notExist&#39;)" >
							<span>  download</span>
							</button>
						</div>
						<p style="position:absolute;color:#262626;bottom:10px;right:10px">V.1.2</p>
					</div>	
				</div>
			</div>	
		</div>
	</div>
<script src="https:mbahbabat.github.io/js/codemirror.js"></script>
<script src="https:mbahbabat.github.io/js/jquery.js"></script>
<script src="https:mbahbabat.github.io/js/spin.js"></script>
<script src="https:mbahbabat.github.io/js/jquery.spin.js"></script>
<script src="https:mbahbabat.github.io/js/abp.js"></script>
<script src="https:mbahbabat.github.io/js/abp.spin.js"></script>
<script src="https:mbahbabat.github.io/js/axios.min.js"></script>
<script src="https:mbahbabat.github.io/js/index.js"></script>		
</body>
</html>
